name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Дозволяє запускати збірку вручну з інтерфейсу GitHub

jobs:
  build-windows:
    runs-on: windows-latest # Критично важливо: jpackage збирає .exe тільки на Windows-сервері

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build project with Maven
        run: mvn clean package

      - name: Build EXE with jpackage
        # Утиліта бере наш скомпільований JAR, папку libs і загортає це все в інсталятор
        run: |
          jpackage --type exe `
          --dest target/installer `
          --input target `
          --name LemmatizerApp `
          --main-jar DesktopLemmatizer-1.0-SNAPSHOT.jar `
          --main-class ua.lemmatizer.Main `
          --win-shortcut `
          --win-menu

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LemmatizerApp-Windows
          path: target/installer/*.exe