name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    # Вказуємо, що всі команди треба виконувати в папці проєкту
    defaults:
      run:
        working-directory: ./Lemmatizer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build project with Maven
        run: mvn clean package

      - name: Build EXE with jpackage
        run: |
          jpackage --type exe `
          --dest target/installer `
          --input target `
          --name LemmatizerApp `
          --main-jar DesktopLemmatizer-1.0-SNAPSHOT.jar `
          --main-class ua.lemmatizer.Main `
          --win-shortcut `
          --win-menu

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LemmatizerApp-Windows
          # Тут також вказуємо правильний шлях для завантаження артефакту
          path: Lemmatizer/target/installer/*.exe